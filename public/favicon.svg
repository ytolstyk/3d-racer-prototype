<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <pattern id="checker" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="white"/>
      <rect width="3" height="3" fill="black"/>
      <rect x="3" y="3" width="3" height="3" fill="black"/>
    </pattern>
  </defs>
  <!-- pole -->
  <rect x="2" y="2" width="2" height="29" rx="1" fill="#222"/>
  <!-- flag body -->
  <rect x="4" y="2" width="24" height="18" fill="url(#checker)"/>
  <!-- flag border -->
  <rect x="4" y="2" width="24" height="18" fill="none" stroke="#000" stroke-width="0.5"/>
</svg>
